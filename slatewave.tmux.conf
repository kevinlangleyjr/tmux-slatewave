# Slatewave -- tmux theme
# https://getslatewave.com
#
# A Slatewave status bar and pane styling for tmux. Designed as a companion
# to the Starship/oh-my-posh prompts and the editor/terminal themes -- editor,
# terminal, multiplexer, and prompt all speak the same visual language.
#
# Powerline glyphs (U+E0B0 / U+E0B2) require a Nerd Font in your terminal.
# See README.md for installation and customization.
#
# Tested on tmux >= 3.2.

# ---------------------------------------------------------------------------
# Palette -- canonical Slatewave colors, shared with starship / oh-my-posh.
# tmux has no named-variable mechanism in config files, so the hex values are
# inlined throughout. Update both this reference block and the uses below
# together if you fork the palette.
# ---------------------------------------------------------------------------
#
# Backgrounds
#   bg_inset     #0f172a   editor inset / deep pill fg
#   bg_elevated  #1e293b   bar background
#   bg_raised    #21252b   editor chrome (reserved)
#   bg_base      #282c34   editor bg (reserved)
#   chrome_dark  #2c313a   clock pill bg
#   chrome_light #3e4451   date / active window pill bg
#
# Foregrounds
#   fg_faint   #64748b   disabled text (reserved)
#   fg_muted   #94a3b8   inactive window fg, display-panes
#   fg_subtle  #cbd5e1   subtle fg (reserved)
#   fg_default #e2e8f0   date fg
#   fg_bright  #f1f5f9   bright fg (reserved)
#
# Accent (teal family)
#   teal_200   #99f6e4   copy-mode marks (reserved)
#   teal_300   #5eead4   signature -- session, active window, clock, borders
#   teal_600   #0f766e   deep teal (reserved)
#   teal_700   #0e7490   deep teal (reserved)
#   cyan_fg    #ecfeff   on-teal text (reserved)
#
# State
#   sky_400    #38bdf8   activity indicator
#   rose_400   #fb7185   prefix-active, alert
#   red_bright #ef5350   error (reserved)
#   purple     #b388ff   mode/structure (reserved)
#   amber_400  #fbbf24   bell indicator
#   amber_700  #b45309   warning bg (reserved)
#   orange     #ff4500   severe (reserved)
#   git_ink    #193549   dark fg on bright bg (reserved)

# ---------------------------------------------------------------------------
# Status bar -- position, cadence, base style
# ---------------------------------------------------------------------------
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 150

# Bar baseline: fg_default on bg_elevated. Every other segment overrides.
set -g status-style "bg=#1e293b,fg=#e2e8f0"

# ---------------------------------------------------------------------------
# Left: session pill
#   teal_300 bg, bg_inset fg, bold -- then  (U+E0B0) arrow back to bar bg
# ---------------------------------------------------------------------------
set -g status-left "#[fg=#0f172a,bg=#5eead4,bold]  #S #[fg=#5eead4,bg=#1e293b,nobold] "

# ---------------------------------------------------------------------------
# Window list -- fills the space between left and right
# ---------------------------------------------------------------------------
set -g window-status-separator ""

# Inactive windows: fg_muted on bar bg
set -g window-status-style "fg=#94a3b8,bg=#1e293b"
set -g window-status-format " #I:#W#{?window_flags,#F, } "

# Active window: teal_300 on chrome_light, wrapped in powerline arrows
#  (U+E0B0) leads in,  trails out
set -g window-status-current-style "fg=#5eead4,bg=#3e4451,bold"
set -g window-status-current-format "#[fg=#3e4451,bg=#1e293b]#[fg=#5eead4,bg=#3e4451,bold] #I:#W#{?window_flags,#F, } #[fg=#3e4451,bg=#1e293b,nobold]"

# Bell / activity indicators on the inactive windows
set -g window-status-bell-style "fg=#fbbf24,bg=#1e293b,bold"
set -g window-status-activity-style "fg=#38bdf8,bg=#1e293b"

# Last-window (alt/next-prev target)
set -g window-status-last-style "fg=#cbd5e1,bg=#1e293b"

# ---------------------------------------------------------------------------
# Right: prefix indicator -> date pill -> time pill
#   prefix:  rose_400 bg, bg_inset fg, bold -- only when prefix held
#   date:    chrome_light bg, fg_default fg
#   time:    chrome_dark bg, teal_300 fg
#
# Commas inside conditional values are escaped as "#,".
# ---------------------------------------------------------------------------
set -g status-right "#{?client_prefix,#[fg=#1e293b#,bg=#fb7185]#[fg=#0f172a#,bg=#fb7185#,bold]  PREFIX #[fg=#fb7185#,bg=#1e293b#,nobold] ,}#[fg=#3e4451,bg=#1e293b]#[fg=#e2e8f0,bg=#3e4451]  %a %b %-d #[fg=#2c313a,bg=#3e4451]#[fg=#5eead4,bg=#2c313a]  %-I:%M %p "

# ---------------------------------------------------------------------------
# Pane borders
#   inactive: chrome_light (low-contrast slate)
#   active:   teal_300 (signature accent)
#   border status line (off by default; flip on if you title your panes)
# ---------------------------------------------------------------------------
set -g pane-border-style "fg=#3e4451"
set -g pane-active-border-style "fg=#5eead4"
set -g pane-border-lines single
set -g pane-border-status off
set -g pane-border-format " #[fg=#5eead4,bold]#P#[fg=#94a3b8,nobold]: #T "

# ---------------------------------------------------------------------------
# Messages & command prompt
#   teal_300 text on bg_elevated -- reads like a system toast
# ---------------------------------------------------------------------------
set -g message-style "fg=#5eead4,bg=#1e293b"
set -g message-command-style "fg=#5eead4,bg=#1e293b"

# ---------------------------------------------------------------------------
# Copy mode / selection
# ---------------------------------------------------------------------------
set -g mode-style "fg=#0f172a,bg=#5eead4"
set -g copy-mode-match-style "fg=#0f172a,bg=#38bdf8"
set -g copy-mode-current-match-style "fg=#0f172a,bg=#5eead4,bold"
set -g copy-mode-mark-style "fg=#0f172a,bg=#fbbf24"

# ---------------------------------------------------------------------------
# display-panes (prefix + q)
# ---------------------------------------------------------------------------
set -g display-panes-colour "#94a3b8"
set -g display-panes-active-colour "#5eead4"

# ---------------------------------------------------------------------------
# Clock mode (prefix + t)
# ---------------------------------------------------------------------------
set -g clock-mode-colour "#5eead4"
set -g clock-mode-style 12

# ---------------------------------------------------------------------------
# Menus (popup menus, choose-tree, etc.)
# ---------------------------------------------------------------------------
set -g menu-style "fg=#e2e8f0,bg=#1e293b"
set -g menu-selected-style "fg=#0f172a,bg=#5eead4,bold"
set -g menu-border-style "fg=#3e4451"

# Popups (display-popup)
set -g popup-style "fg=#e2e8f0,bg=#1e293b"
set -g popup-border-style "fg=#3e4451"
set -g popup-border-lines rounded
